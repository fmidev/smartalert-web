<!DOCTYPE HTML>
<html>

<head>
  <title>SmartAlert</title>
  <meta charset="UTF-8">
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <link rel="apple-touch-icon" href="cap-logo.png">
  <meta name="viewport" content="initial-scale=1.0,
				   maximum-scale=1.0, user-scalable=0" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/fontsource/fonts/roboto@latest/latin-400-normal.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/fontsource/fonts/roboto@latest/latin-500-normal.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/fontsource/fonts/roboto@latest/latin-600-normal.min.css" />
  <script type="text/javascript" src="https://code.jquery.com/jquery-1.9.1.min.js"></script>

  <link rel="stylesheet" href="css/leaflet.css" />
  <link rel="stylesheet" href="css/capmap.css?v=2" />
  <script type="text/javascript" src="js/leaflet.js"></script>

  <script type="text/javascript" src="capmap-config.js?v=2"></script>
  <script type="text/javascript" src="locations.js"></script>
  <script type="text/javascript" src="js/capmap.js?v=2"></script>
  <script type="text/javascript" src="ethiopian_calendar.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dayjs@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/dayjs@1.10.7/plugin/utc.js"></script>
  <!-- Include Timezone plugin from CDN -->
  <script src="https://cdn.jsdelivr.net/npm/dayjs@1.10.7/plugin/timezone.js"></script>
  <script>
    // Extend dayjs with the plugins
    dayjs.extend(dayjs_plugin_utc);
    dayjs.extend(dayjs_plugin_timezone);
  </script>
  <!-- Add translation files for required languages-->
  <!--<script type="text/javascript" src="i18n/translations-en-US.js"></script-->
  <script type="text/javascript" src="i18n/translations-ka-GE.js"></script>
  <script type="text/javascript" src="i18n/translations-en-GE.js"></script>
  <!--<script type="text/javascript" src="i18n/translations-ru-KG.js"></script>
      <script type="text/javascript" src="i18n/translations-ky-KG.js"></script>-->

  <script type="text/javascript">
    $(document).ready(function () {
      //  google.maps.event.addDomListener(window, 'load', initialize);
      L.DomEvent.addListener(window, 'load', initialize);
      // initialize ()
    });
  </script>

</head>

<body>
  <div id="map-canvas"></div>

  <!-- Top-right toolbar: panels + buttons -->
  <div id="topright-toolbar">
    <!-- Panels area (opens to the left of buttons) -->
    <div id="topright-panels">
      <!-- Filter panel (language, event type, severity legend) -->
      <div id="filter-panel" class="topright-panel" style="display: none;">
        <button class="panel-close-btn" data-panel="filter-panel">&times;</button>
        <div id="eventSelect">
          <select id="eventType">
            <option value="">All Hazard Types</option>
          </select>
          <select id="lang">
            <option value="en-US">English</option>
          </select>
        </div>
        <hr class="panel-divider">
        <div id="legend-warning-types">
          <div class="warning-row">
            <span class="colorLegend" id="levelNone"></span>
            <span id="levelNoneText">no awareness needed</span>
          </div>
          <div class="warning-row">
            <span class="colorLegend" id="levelYellow"></span>
            <span id="levelYellowText">potentially dangerous</span>
          </div>
          <div class="warning-row">
            <span class="colorLegend" id="levelOrange"></span>
            <span id="levelOrangeText">dangerous</span>
          </div>
          <div class="warning-row">
            <span class="colorLegend" id="levelRed"></span>
            <span id="levelRedText">very dangerous</span>
          </div>
        </div>
        <hr class="panel-divider">
        <div id="senderName"></div>
        <hr class="panel-divider">
        <div id="sentDate"></div>
      </div>

      <!-- Icon legend panel -->
      <div id="icon-legend-panel" class="topright-panel" style="display: none;">
        <button class="panel-close-btn" data-panel="icon-legend-panel">&times;</button>
        <table align="center" id="legend-icon-names">
          <tbody id="icon-legend-body">
          </tbody>
        </table>
      </div>
    </div>

    <!-- Buttons column -->
    <div id="topright-buttons">
      <button id="filter-toggle-btn" class="topright-btn" title="Filters">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="4" y1="6" x2="20" y2="6"></line>
          <line x1="7" y1="12" x2="17" y2="12"></line>
          <line x1="10" y1="18" x2="14" y2="18"></line>
        </svg>
      </button>
      <button id="icon-legend-btn" class="topright-btn" title="Map legend">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"></circle>
          <line x1="12" y1="16" x2="12" y2="12"></line>
          <line x1="12" y1="8" x2="12.01" y2="8"></line>
        </svg>
      </button>
    </div>
  </div>

</body>

</html>
